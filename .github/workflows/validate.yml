name: Validate Football Lab

on:
  pull_request:
  push:
    branches: ["master"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install analytics package
        run: pip install -e ".[dev]"

      - name: Test Python pipeline
        run: pytest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Validate web application
        run: npm run check

      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: football-lab-${{ github.sha }}
          path: out
          retention-days: 30
